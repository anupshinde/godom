<div class="flex items-center justify-center gap-4">
    <button g-click="Decrement" class="w-8 h-8 text-lg border border-gray-300 rounded-full cursor-pointer bg-gray-50 hover:bg-gray-100">−</button>
    <div class="text-3xl font-mono w-20 text-center">{{Count}}</div>
    <button g-click="Increment" class="w-8 h-8 text-lg border border-gray-300 rounded-full cursor-pointer bg-gray-50 hover:bg-gray-100">+</button>
</div>
