<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Markdown Editor</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; height: 100vh; display: flex; flex-direction: column; }
        header { padding: 12px 20px; background: #1a1a2e; color: #eee; font-size: 16px; font-weight: 600; display: flex; align-items: center; justify-content: space-between; }
        .header-actions { display: flex; gap: 8px; }
        .save-btn { background: #2d6a4f; border: none; color: #eee; padding: 6px 14px; border-radius: 6px; font-size: 13px; cursor: pointer; }
        .save-btn:hover { background: #40916c; }
        .toast { color: #6fcf97; font-size: 13px; font-weight: 400; }
        .toggle-btn { display: none; background: none; border: 1px solid rgba(255,255,255,0.3); color: #eee; padding: 6px 14px; border-radius: 6px; font-size: 13px; cursor: pointer; }
        .toggle-btn:hover { background: rgba(255,255,255,0.1); }
        .editor { display: flex; flex: 1; min-height: 0; }
        .pane { flex: 1; overflow: auto; padding: 20px; }
        .pane-label { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: #888; margin-bottom: 8px; }
        textarea {
            width: 100%; height: calc(100% - 24px); resize: none; border: none; outline: none;
            font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
            font-size: 14px; line-height: 1.6; background: #fafafa; padding: 12px; border-radius: 6px;
        }
        .divider { width: 1px; background: #e0e0e0; }
        .preview { line-height: 1.7; color: #333; }
        .preview h1 { font-size: 28px; margin: 0 0 12px; border-bottom: 1px solid #eee; padding-bottom: 8px; }
        .preview h2 { font-size: 22px; margin: 16px 0 8px; }
        .preview h3 { font-size: 18px; margin: 12px 0 6px; }
        .preview p { margin: 0 0 12px; }
        .preview ul, .preview ol { margin: 0 0 12px; padding-left: 24px; }
        .preview li { margin: 4px 0; }
        .preview code { background: #f0f0f0; padding: 2px 6px; border-radius: 3px; font-size: 13px; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
        .preview pre { background: #f5f5f5; padding: 12px; border-radius: 6px; margin: 0 0 12px; overflow-x: auto; }
        .preview pre code { background: none; padding: 0; }
        .preview blockquote { border-left: 3px solid #ddd; padding-left: 12px; color: #666; margin: 0 0 12px; }
        .preview a { color: #0066cc; }
        .preview strong { font-weight: 600; }
        .preview hr { border: none; border-top: 1px solid #eee; margin: 16px 0; }
        .preview table { border-collapse: collapse; margin: 0 0 12px; width: 100%; }
        .preview th, .preview td { border: 1px solid #ddd; padding: 6px 10px; text-align: left; }
        .preview th { background: #f5f5f5; font-weight: 600; }

        @media (max-width: 768px) {
            .editor { flex-direction: column; }
            .divider { width: auto; height: 1px; }
            .toggle-btn { display: inline-block; }
            .editor-pane { flex: none; height: 45vh; }
            .editor-pane.collapsed { display: none; }
            .preview-pane { flex: 1; }
            textarea { font-size: 16px; height: calc(100% - 24px); }
            .preview { font-size: 16px; line-height: 1.8; }
            .preview h1 { font-size: 24px; }
            .preview h2 { font-size: 20px; }
            .preview h3 { font-size: 17px; }
            .preview code { font-size: 14px; }
            .pane { padding: 14px; }
        }
    </style>
</head>
<body>
    <header>
        <span>Markdown Editor</span>
        <div class="header-actions">
            <span class="toast" g-show="ShowSaved" g-text="SaveMessage"></span>
            <button class="save-btn" g-click="Save">Save</button>
            <button class="toggle-btn" g-click="ToggleEditor" g-text="ToggleLabel"></button>
        </div>
    </header>
    <div class="editor">
        <div class="pane editor-pane" g-class:collapsed="!EditorOpen">
            <div class="pane-label">Markdown</div>
            <textarea g-bind="Markdown" g-scroll="OnEditorScroll" g-prop:_scrollratio="EditorScroll"></textarea>
        </div>
        <div class="divider" g-show="EditorOpen"></div>
        <div class="pane preview-pane" g-scroll="OnPreviewScroll" g-prop:_scrollratio="PreviewScroll">
            <div class="pane-label">Preview</div>
            <div class="preview" g-html="Preview"></div>
        </div>
    </div>
</body>
</html>
