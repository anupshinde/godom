<div class="flex flex-col items-center">
    <svg viewBox="0 0 100 100" class="w-40 h-40">
        <circle cx="50" cy="50" r="48" fill="#1a1a2e" stroke="#e0e0e0" stroke-width="1.5"/>

        <line x1="50" y1="5" x2="50" y2="10" stroke="#e0e0e0" stroke-width="1.5" transform="rotate(90 50 50)"/>
        <line x1="50" y1="5" x2="50" y2="10" stroke="#e0e0e0" stroke-width="1.5" transform="rotate(120 50 50)"/>

        <line x1="50" y1="5" x2="50" y2="10" stroke="#e0e0e0" stroke-width="1.5" transform="rotate(180 50 50)"/>
        <line x1="50" y1="5" x2="50" y2="10" stroke="#e0e0e0" stroke-width="1.5" transform="rotate(210 50 50)"/>

        <line x1="50" y1="5" x2="50" y2="10" stroke="#e0e0e0" stroke-width="1.5" transform="rotate(270 50 50)"/>

        <line x1="50" y1="5" x2="50" y2="10" stroke="#e0e0e0" stroke-width="1.5" transform="rotate(330 50 50)"/>

        <circle cx="50" cy="50" r="2" fill="#e94560"/>
    </svg>
    <div class="font-mono text-lg mt-3 text-gray-700" g-text="Time">00:00:00</div>

    <hr class="my-4 border-gray-200 w-full"/>
    <div class="flex items-center justify-between text-sm text-gray-500 w-full">
        <span>Shared Counter</span>
        <span class="text-lg font-medium text-blue-600" g-text="Count">0</span>
    </div>
    <div class="text-xs text-gray-400 text-right w-full">Step: <span g-text="Step">1</span></div>
</div>
