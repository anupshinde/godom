<div class="text-center">
    <div class="text-5xl mb-4 font-light">{{Count}}</div>
    <div class="flex gap-3 justify-center mb-4">
        <button g-click="Decrement" class="px-5 py-1.5 text-lg border border-gray-300 rounded-md bg-gray-50 hover:bg-gray-100 cursor-pointer">−</button>
        <button g-click="Increment" class="px-5 py-1.5 text-lg border border-gray-300 rounded-md bg-gray-50 hover:bg-gray-100 cursor-pointer">+</button>
    </div>
    <div class="text-sm text-gray-500">
        <label class="mr-2">Step size:</label>
        <input type="number" min="1" max="100" g-bind="Step" class="w-16 px-2 py-1 text-sm border border-gray-300 rounded"/>
    </div>
</div>
