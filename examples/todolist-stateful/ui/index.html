<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Todo List (Stateful)</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; max-width: 500px; margin: 40px auto; padding: 0 20px; color: #333; }
        h1 { margin-bottom: 20px; font-size: 28px; }
        .add-form { display: flex; gap: 8px; margin-bottom: 20px; }
        .add-form input { flex: 1; padding: 8px 12px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; }
        .add-form button { padding: 8px 16px; background: #4a90d9; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; }
        ul { list-style: none; }
        li { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid #eee; }
        li.done span { text-decoration: line-through; color: #999; }
        li span { flex: 1; font-size: 15px; }
        li button { background: none; border: none; color: #cc4444; cursor: pointer; font-size: 18px; }
    </style>
</head>
<body>
    <h1>Todo List (Stateful)</h1>

    <div class="add-form">
        <input type="text" placeholder="What needs to be done?" g-bind="InputText" g-keydown="Enter:AddTodo" />
        <button g-click="AddTodo">Add</button>
    </div>

    <ul>
        <todo-item g-for="todo, i in Todos" :Text="todo.Text" :Done="todo.Done" :Index="i"></todo-item>
    </ul>
</body>
</html>
