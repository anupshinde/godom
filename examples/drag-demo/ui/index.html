<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Drag &amp; Drop Demo</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            max-width: 800px;
            margin: 30px auto;
            padding: 0 20px;
            color: #333;
        }
        h1 { margin-bottom: 6px; font-size: 22px; }
        .subtitle { color: #888; font-size: 13px; margin-bottom: 20px; }

        .layout { display: flex; gap: 20px; }

        /* Palette */
        .palette {
            width: 160px;
            flex-shrink: 0;
        }
        .palette h2 { font-size: 14px; color: #666; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
        .palette-item {
            padding: 10px 14px;
            margin-bottom: 6px;
            border-radius: 6px;
            color: white;
            font-weight: 600;
            font-size: 14px;
            cursor: grab;
            user-select: none;
            transition: transform 0.1s, opacity 0.1s;
        }
        .palette-item:hover { transform: scale(1.03); }
        .palette-item.g-dragging { opacity: 0.3; }

        /* Canvas */
        .canvas-area { flex: 1; }
        .canvas-area h2 { font-size: 14px; color: #666; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
        .canvas {
            min-height: 200px;
            border: 2px dashed #ddd;
            border-radius: 8px;
            padding: 8px;
            transition: border-color 0.15s, background 0.15s;
        }
        .canvas.g-drag-over {
            border-color: #4a90d9;
            background: #f0f6ff;
        }
        .canvas-empty {
            color: #bbb;
            text-align: center;
            padding: 60px 20px;
            font-size: 14px;
        }

        .canvas-card {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 14px;
            margin-bottom: 4px;
            border-radius: 6px;
            color: white;
            font-weight: 600;
            font-size: 14px;
            cursor: grab;
            user-select: none;
            transition: transform 0.1s, opacity 0.1s;
        }
        .canvas-card:hover { transform: scale(1.01); }
        .canvas-card.g-dragging { opacity: 0.3; }
        .canvas-card span { flex: 1; }
        .canvas-card .remove { cursor: pointer; opacity: 0.6; }
        .canvas-card .remove:hover { opacity: 1; }

        /* Trash */
        .trash {
            margin-top: 12px;
            border: 2px dashed #ddd;
            border-radius: 8px;
            padding: 14px;
            text-align: center;
            color: #bbb;
            font-size: 13px;
            transition: border-color 0.15s, background 0.15s, color 0.15s;
        }
        .trash.g-drag-over {
            border-color: #e74c3c;
            background: #fdf0ef;
            color: #e74c3c;
        }
    </style>
</head>
<body>
    <h1>Drag &amp; Drop Demo</h1>
    <p class="subtitle">Drag colors to the canvas, reorder, or trash them</p>

    <div class="layout">
        <div class="palette">
            <h2>Palette</h2>
            <div g-for="color, i in Palette" class="palette-item"
                 g-style:background-color="color.Hex"
                 g-draggable:palette="i">
                <span g-text="color.Name"></span>
            </div>
        </div>

        <div class="canvas-area">
            <h2>Canvas</h2>
            <div class="canvas" g-drop:palette="Add">
                <div g-if="Canvas">
                    <div g-for="card, i in Canvas" class="canvas-card"
                         g-style:background-color="card.Color"
                         g-draggable:canvas="i"
                         g-drop:canvas="Reorder">
                        <span g-text="card.Label"></span>
                        <span class="remove" g-click="Remove(i, 0)">&times;</span>
                    </div>
                </div>
                <div class="canvas-empty" g-hide="Canvas">
                    Drag colors from the palette
                </div>
            </div>

            <div class="trash" g-drop:canvas="Remove">
                Drop here to remove
            </div>
        </div>
    </div>
</body>
</html>
