<!DOCTYPE html>
<html>
<head>
    <title>System Monitor</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #0f0f1a;
            color: #e0e0e0;
            min-height: 100vh;
        }
        .header {
            padding: 1.5rem 2rem;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .header h1 {
            font-size: 1.2rem;
            font-weight: 600;
            letter-spacing: -0.02em;
        }
        .header .dot {
            width: 8px;
            height: 8px;
            background: #22c55e;
            border-radius: 50%;
            display: inline-block;
            margin-right: 0.5rem;
            animation: pulse 2s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        .uptime {
            font-family: "SF Mono", "Fira Code", monospace;
            font-size: 0.85rem;
            color: #666;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 1px;
            background: rgba(255,255,255,0.04);
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }
        .card {
            background: #0f0f1a;
            padding: 1.5rem 2rem;
        }
        .card-label {
            font-size: 0.7rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #555;
            margin-bottom: 0.75rem;
        }
        .card-value {
            font-family: "SF Mono", "Fira Code", monospace;
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 1rem;
        }
        .card-bar {
            background: rgba(255,255,255,0.06);
            border-radius: 3px;
            height: 4px;
            overflow: hidden;
        }
        .card-bar-fill {
            height: 100%;
            border-radius: 3px;
            background: linear-gradient(90deg, #6366f1, #a78bfa);
            transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
    </style>
</head>
<body>
    <div class="header">
        <h1><span class="dot"></span>System Monitor</h1>
        <div class="uptime" g-text="Uptime">00:00:00</div>
    </div>
    <div class="grid">
        <stat-card g-for="stat in Stats"></stat-card>
    </div>
</body>
</html>
