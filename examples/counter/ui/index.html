<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8"/>
    <title>Counter</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; max-width: 400px; margin: 60px auto; text-align: center; }
        h1 { font-size: 48px; margin-bottom: 20px; }
        .controls { display: flex; gap: 12px; justify-content: center; margin-bottom: 20px; }
        button { padding: 10px 24px; font-size: 20px; border: 1px solid #ccc; border-radius: 6px; cursor: pointer; background: #f5f5f5; }
        button:hover { background: #e0e0e0; }
        .step { margin-top: 20px; font-size: 14px; color: #666; }
        .step label { margin-right: 8px; }
        .step input { width: 60px; padding: 4px 8px; font-size: 14px; border: 1px solid #ccc; border-radius: 4px; }
    </style>
</head>
<body>
    <h1><span g-text="Count">0</span></h1>
    <div class="controls">
        <button g-click="Decrement">−</button>
        <button g-click="Increment">+</button>
    </div>
    <div class="step">
        <label>Step size:</label>
        <input type="number" min="1" max="100" g-bind="Step"/>
    </div>
</body>
</html>
