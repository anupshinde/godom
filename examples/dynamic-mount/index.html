<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Dynamic Mount</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            max-width: 600px;
            margin: 40px auto;
            padding: 0 20px;
        }
        h1 { font-size: 1.4rem; margin-bottom: 0.3rem; }
        .subtitle { color: #888; font-size: 0.85rem; margin-bottom: 1.5rem; }
        .buttons { display: flex; gap: 8px; margin-bottom: 1.5rem; }
        .buttons button {
            padding: 8px 16px;
            border: 1px solid #ccc;
            border-radius: 6px;
            cursor: pointer;
            background: #f5f5f5;
            font-size: 0.9rem;
        }
        .buttons button:hover { background: #e0e0e0; }
        #containers { display: flex; flex-direction: column; gap: 12px; }
        .mount-card {
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 16px;
            background: #fafafa;
        }
        .mount-card .label {
            font-size: 0.75rem;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 8px;
        }
    </style>
</head>
<body>
    <h1>Dynamic Mount</h1>
    <p class="subtitle">Click a button to create a container and mount a component into it via godom.mount()</p>

    <div class="buttons">
        <button onclick="mountComponent('counter')">Mount Counter</button>
        <button onclick="mountComponent('clock')">Mount Clock</button>
    </div>

    <div id="containers"></div>

    <script src="/godom.js"></script>
    <script>
        var ns = window[window.GODOM_NS || "godom"];
        var count = 0;

        function mountComponent(name) {
            count++;
            var card = document.createElement("div");
            card.className = "mount-card";
            card.innerHTML = '<div class="label">#' + count + ' — ' + name + ' (dynamically mounted)</div>';

            var target = document.createElement("div");
            card.appendChild(target);
            document.getElementById("containers").appendChild(card);

            ns.mount(name, target);
        }
    </script>
</body>
</html>
