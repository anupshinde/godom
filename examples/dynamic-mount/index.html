<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Dynamic Mount — JS</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            max-width: 600px;
            margin: 40px auto;
            padding: 0 20px;
        }
        h1 { font-size: 1.4rem; margin-bottom: 0.3rem; }
        .subtitle { color: #888; font-size: 0.85rem; margin-bottom: 1.5rem; }
        nav { display: flex; gap: 12px; margin-bottom: 1.5rem; border-bottom: 1px solid #eee; padding-bottom: 12px; }
        nav a { text-decoration: none; color: #666; padding: 4px 8px; border-radius: 4px; font-size: 0.9rem; }
        nav a.active { background: #333; color: #fff; }
        nav a:hover:not(.active) { background: #f0f0f0; }
        .buttons { display: flex; gap: 8px; margin-bottom: 1.5rem; }
        .buttons button {
            padding: 8px 16px;
            border: 1px solid #ccc;
            border-radius: 6px;
            cursor: pointer;
            background: #f5f5f5;
            font-size: 0.9rem;
        }
        .buttons button:hover { background: #e0e0e0; }
        #containers { display: flex; flex-direction: column; gap: 12px; }
        .mount-card {
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 16px;
            background: #fafafa;
        }
        .mount-card .label {
            font-size: 0.75rem;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 8px;
        }
        .note {
            margin-top: 1.5rem;
            padding: 12px;
            background: #fff8e1;
            border: 1px solid #ffe082;
            border-radius: 6px;
            font-size: 0.8rem;
            color: #666;
        }
    </style>
</head>
<body>
    <h1>Dynamic Mount</h1>
    <nav>
        <a href="/" class="active">JS Mount</a>
        <a href="/godom">Godom Mount</a>
    </nav>
    <p class="subtitle">Creates containers with JavaScript, mounts components via godom.mount()</p>

    <div class="note">
        Components mounted here are lost on page reload — the containers are created by JS and don't survive navigation.
    </div>

    <div class="buttons">
        <button onclick="mountComponent('counter')">Add Counter</button>
        <button onclick="mountComponent('clock')">Add Clock</button>
    </div>

    <div id="containers"></div>

    <script src="/godom.js"></script>
    <script>
        var ns = window[window.GODOM_NS || "godom"];
        var count = 0;

        function mountComponent(name) {
            count++;
            var card = document.createElement("div");
            card.className = "mount-card";
            card.innerHTML = '<div class="label">#' + count + ' — ' + name + '</div>';

            var target = document.createElement("div");
            card.appendChild(target);
            document.getElementById("containers").appendChild(card);

            ns.mount(name, target);
        }
    </script>
</body>
</html>
