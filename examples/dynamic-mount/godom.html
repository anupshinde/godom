<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Dynamic Mount — Godom</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            max-width: 600px;
            margin: 40px auto;
            padding: 0 20px;
        }
        h1 { font-size: 1.4rem; margin-bottom: 0.3rem; }
        .subtitle { color: #888; font-size: 0.85rem; margin-bottom: 1.5rem; }
        nav { display: flex; gap: 12px; margin-bottom: 1.5rem; border-bottom: 1px solid #eee; padding-bottom: 12px; }
        nav a { text-decoration: none; color: #666; padding: 4px 8px; border-radius: 4px; font-size: 0.9rem; }
        nav a.active { background: #333; color: #fff; }
        nav a:hover:not(.active) { background: #f0f0f0; }
        .buttons { display: flex; gap: 8px; margin-bottom: 1.5rem; }
        .buttons button {
            padding: 8px 16px;
            border: 1px solid #ccc;
            border-radius: 6px;
            cursor: pointer;
            background: #f5f5f5;
            font-size: 0.9rem;
        }
        .buttons button:hover { background: #e0e0e0; }
        .note {
            margin-top: 1.5rem;
            padding: 12px;
            background: #e8f5e9;
            border: 1px solid #a5d6a7;
            border-radius: 6px;
            font-size: 0.8rem;
            color: #666;
        }
    </style>
</head>
<body>
    <h1>Dynamic Mount</h1>
    <nav>
        <a href="/">JS Mount</a>
        <a href="/godom" class="active">Godom Mount</a>
    </nav>
    <p class="subtitle">Widgets are managed by a Go layout component — state survives page reload</p>

    <div class="note">
        Components mounted here persist across page reloads — the widget list lives in the Go process.
    </div>

    <div class="buttons">
        <button onclick="godom.call('AddCounter')">Add Counter</button>
        <button onclick="godom.call('AddClock')">Add Clock</button>
    </div>

    <div g-component="layout"></div>

    <script src="/godom.js"></script>
</body>
</html>
