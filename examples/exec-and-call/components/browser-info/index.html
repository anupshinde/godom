<style>
    .info-card {
        background: #fff;
        border: 1px solid #e0e0e0;
        border-radius: 8px;
        padding: 1.5rem;
    }
    .info-row {
        display: flex;
        padding: 0.6rem 0;
        border-bottom: 1px solid #f0f0f0;
    }
    .info-row:last-child { border-bottom: none; }
    .info-label {
        width: 120px;
        font-size: 0.8rem;
        color: #999;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        flex-shrink: 0;
    }
    .info-value {
        color: #333;
        font-size: 0.9rem;
        word-break: break-all;
    }
    .info-actions {
        display: flex;
        gap: 0.8rem;
        margin-top: 1.2rem;
    }
    .info-actions button {
        padding: 0.5rem 1.2rem;
        border: 1px solid #ddd;
        border-radius: 6px;
        background: #fff;
        cursor: pointer;
        font-size: 0.85rem;
        font-family: inherit;
    }
    .info-actions button:hover { background: #f5f5f5; }
    .info-actions .primary {
        background: #4a90d9;
        color: #fff;
        border-color: #4a90d9;
    }
    .info-actions .primary:hover { background: #3a7bc8; }
    .info-empty {
        color: #bbb;
        font-size: 0.9rem;
        padding: 2rem;
        text-align: center;
    }
</style>

<div class="info-card">
    <div g-show="Ready">
        <div class="info-row">
            <div class="info-label">URL</div>
            <div class="info-value" g-text="URL">—</div>
        </div>
        <div class="info-row">
            <div class="info-label">Path</div>
            <div class="info-value" g-text="Path">—</div>
        </div>
        <div class="info-row">
            <div class="info-label">Viewport</div>
            <div class="info-value" g-text="Viewport">—</div>
        </div>
        <div class="info-row">
            <div class="info-label">User Agent</div>
            <div class="info-value" g-text="UserAgent">—</div>
        </div>
    </div>
    <div class="info-empty" g-hide="Ready">
        Click "Fetch Info" to query the browser via ExecJS.
    </div>
    <div class="info-actions">
        <button class="primary" g-click="FetchInfo">Fetch Info</button>
        <button g-click="GoToCatalog">Go to Catalog →</button>
    </div>
</div>
