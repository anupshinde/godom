<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{.Title}} — Browser Explorer</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@shoelace-style/shoelace@2.20.1/cdn/themes/light.css"/>
    <script type="module" src="https://cdn.jsdelivr.net/npm/@shoelace-style/shoelace@2.20.1/cdn/shoelace-autoloader.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f8f9fa;
            color: #333;
            min-height: 100vh;
        }
        nav {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            padding: 0.7rem 1.5rem;
            background: #fff;
            border-bottom: 1px solid #e0e0e0;
        }
        nav .brand {
            font-size: 1rem;
            font-weight: 700;
            color: #333;
            text-decoration: none;
        }
        nav a {
            color: #888;
            text-decoration: none;
            font-size: 0.85rem;
        }
        nav a:hover { color: #333; }
        nav a.active { color: #4a90d9; text-decoration: underline; text-underline-offset: 4px; }
        .page {
            max-width: 960px;
            margin: 1.5rem auto;
            padding: 0 1rem;
        }
    </style>
</head>
<body>
    <nav>
        <a href="/" class="brand">Browser Explorer</a>
        <a href="/"{{if eq .Page "info"}} class="active"{{end}}>Browser Info</a>
        <a href="/catalog"{{if eq .Page "catalog"}} class="active"{{end}}>Catalog</a>
    </nav>
    {{block "content" .}}{{end}}
    <script src="/godom.js"></script>
</body>
</html>
