<div>
    <style>
        .toast-container { position: fixed; top: 4.5rem; left: 50%; transform: translateX(-50%); z-index: 100; display: flex; flex-direction: column; align-items: center; gap: 0.5rem; width: calc(100% - 2rem); max-width: 22rem; }
        @media (min-width: 768px) {
            .toast-container { left: auto; right: 1rem; transform: none; }
        }
        @keyframes toast-in {
            0% { opacity: 0; transform: translateY(-0.5rem) scale(0.95); }
            50% { transform: translateY(0.1rem) scale(1.02); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }
        @keyframes toast-out {
            0% { opacity: 1; max-height: 5rem; margin-bottom: 0; transform: scale(1); }
            100% { opacity: 0; max-height: 0; margin-bottom: -0.5rem; padding-top: 0; padding-bottom: 0; transform: scale(0.95); }
        }
        .toast-item { animation: toast-in 0.3s ease-out both; overflow: hidden; }
        .toast-closing { animation: toast-out 0.35s ease-in both; }
    </style>
    <div class="toast-container">
        <div g-for="item in Items" g-key="item.ID"
             class="toast-item flex items-center px-4 py-3 rounded-lg shadow-lg text-sm font-medium border"
             g-class:toast-closing="item.Closing"
             g-class:bg-blue-50="item.IsInfo" g-class:text-blue-800="item.IsInfo" g-class:border-blue-200="item.IsInfo"
             g-class:bg-green-50="item.IsOk" g-class:text-green-800="item.IsOk" g-class:border-green-200="item.IsOk"
             g-class:bg-amber-50="item.IsWarn" g-class:text-amber-800="item.IsWarn" g-class:border-amber-200="item.IsWarn"
             g-class:bg-red-50="item.IsError" g-class:text-red-800="item.IsError" g-class:border-red-200="item.IsError">
            <span g-text="item.Message" class="flex-1">--</span>
            <button g-click="Dismiss(item.ID)" class="ml-3 opacity-50 hover:opacity-100 cursor-pointer text-base leading-none shrink-0">&#10005;</button>
        </div>
    </div>
</div>
