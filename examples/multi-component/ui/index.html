<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8"/>
    <title>Multi-Component Demo</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            margin: 0;
            padding: 20px;
            background: #f5f5f5;
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
        }
        .layout {
            display: flex;
            gap: 30px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .card {
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            min-width: 300px;
        }
        .card h2 {
            margin-top: 0;
            color: #555;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <h1>Multi-Component Demo</h1>
    <div class="layout">
        <div class="card">
            <h2>Counter</h2>
            <div id="CounterSlot"></div>
        </div>
        <div class="card">
            <h2>Clock</h2>
            <div id="ClockSlot"></div>
        </div>
    </div>
</body>
</html>
