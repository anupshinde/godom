<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Multi-Component Demo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .g-dragging { opacity: 0.4; }
        .g-drag-over { box-shadow: 0 0 0 3px rgba(74,144,217,0.4); }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">
    <div class="fixed top-0 left-0 right-0 z-50">
        <g-slot name="navbar"></g-slot>
    </div>
    <g-slot name="toast"></g-slot>
    <div class="pt-14 pb-16 md:pb-0">
        <div class="fixed bottom-0 left-0 right-0 z-40 bg-white border-t border-gray-200 overflow-x-auto md:border-t-0 md:border-r md:top-14 md:bottom-0 md:right-auto md:w-56 md:overflow-x-visible md:overflow-y-auto">
            <g-slot name="sidebar"></g-slot>
        </div>
        <div class="flex-1 md:ml-56">
            <div class="bg-white border-b border-gray-200">
                <g-slot name="tips"></g-slot>
            </div>
            <div class="max-w-5xl mx-auto p-3 sm:p-6">
                <div class="flex flex-col sm:flex-row gap-4 sm:gap-6 justify-center mb-6 sm:mb-8">
                    <div class="bg-white rounded-xl p-4 sm:p-6 shadow-sm w-full sm:w-auto sm:min-w-[320px] cursor-grab active:cursor-grabbing"
                         g-for="slot, i in Slots" g-key="slot.Name"
                         g-draggable="i" g-drop="Reorder">
                        <h2 class="text-xs font-medium text-gray-400 uppercase tracking-wider mb-4">{{slot.Title}}</h2>
                        <g-slot name="{{slot.Name}}"></g-slot>
                    </div>
                </div>
                <div class="bg-white rounded-xl p-4 sm:p-6 shadow-sm">
                    <h2 class="text-xs font-medium text-gray-400 uppercase tracking-wider mb-4">Stock Ticker</h2>
                    <g-slot name="ticker"></g-slot>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
