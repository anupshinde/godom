<style>
    .gdstock-row { display: flex; align-items: center; gap: 16px; font-size: 18px; }
    .gdstock-btn { font-size: 24px; padding: 4px 8px; cursor: pointer; border: none; background: none; line-height: 1; }
    .gdstock-btn:hover { color: #2563eb; }
    .gdstock-price { font-family: monospace; min-width: 200px; text-align: center; }
    .gdstock-up { color: #16a34a; }
    .gdstock-down { color: #dc2626; }
    .gdstock-card { padding: 8px 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    .gdstock-disclaimer { font-size: 11px; color: #9ca3af; margin-top: 16px; text-align: center; }
</style>
<div class="gdstock-card">
<div class="gdstock-row">
    <button g-click="Prev" class="gdstock-btn">&larr;</button>
    <span class="gdstock-price" g-class:gdstock-up="IsUp" g-class:gdstock-down="IsDown">{{Symbol}}: ${{Price}}</span>
    <button g-click="Next" class="gdstock-btn">&rarr;</button>
</div>
<p class="gdstock-disclaimer">Prices shown are simulated.<br/>This component is injected from Godom.</p>
</div>
