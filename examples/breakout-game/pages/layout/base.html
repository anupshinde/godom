<!DOCTYPE html>
<html>
<head>
    <title>{{.Title}} — Breakout</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #1a1a2e;
            color: #e0e0e0;
            min-height: 100vh;
            user-select: none;
            -webkit-user-select: none;
        }
        nav {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.6rem 1rem;
            background: rgba(255,255,255,0.03);
            border-bottom: 1px solid rgba(255,255,255,0.06);
            overflow-x: auto;
            white-space: nowrap;
            -webkit-overflow-scrolling: touch;
        }
        nav .brand {
            font-size: 1rem;
            font-weight: 700;
            color: #f0f0f0;
            letter-spacing: 0.1em;
            text-decoration: none;
            flex-shrink: 0;
        }
        nav a {
            color: #666;
            text-decoration: none;
            font-size: 0.8rem;
            flex-shrink: 0;
        }
        nav a:hover { color: #aaa; }
        nav a.active { color: #5dade2; text-decoration: underline; text-underline-offset: 4px; }
        .page {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 1rem;
        }
        @media (min-width: 600px) {
            nav { gap: 2rem; padding: 0.8rem 1.5rem; }
            nav .brand { font-size: 1.2rem; }
            nav a { font-size: 0.9rem; }
            .page { padding: 1.5rem; }
        }
    </style>
</head>
<body>
    <nav>
        <a href="/" class="brand">BREAKOUT</a>
        <a href="/"{{if eq .Page "menu"}} class="active"{{end}}>Menu</a>
        <a href="/play"{{if eq .Page "play"}} class="active"{{end}}>Play</a>
        <a href="/controller"{{if eq .Page "controller"}} class="active"{{end}}>Controller</a>
        <a href="/scores"{{if eq .Page "scores"}} class="active"{{end}}>Scores</a>
    </nav>
    {{block "content" .}}{{end}}
    <script src="/godom.js"></script>
</body>
</html>
