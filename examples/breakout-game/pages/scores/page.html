{{define "content"}}
<div class="page" style="width: 100%; max-width: 500px; margin: 0 auto;">
    <h2 style="font-size: 1.5rem; font-weight: 700; color: #f0f0f0; letter-spacing: 0.1em; margin-bottom: 1.5rem;">HIGH SCORES</h2>
    <div g-component="scores" style="width: 100%;"></div>
    <div style="margin-top: 2rem;">
        <a href="/play" style="
            display: inline-block;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            color: #aaa;
            padding: 0.6rem 1.5rem;
            border-radius: 6px;
            text-decoration: none;
            font-size: 0.9rem;
        ">Play Again</a>
    </div>
</div>
{{end}}
