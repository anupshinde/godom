<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Sync Demo</title>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 500px; margin: 40px auto; padding: 0 20px; }
        h1 { margin-bottom: 20px; }
        input { width: 100%; padding: 10px; font-size: 16px; border: 1px solid #ccc; border-radius: 4px; margin-bottom: 12px; }
        .hint { color: #888; font-size: 14px; }
    </style>
</head>
<body>
    <h1>Sync Demo</h1>
    <p class="hint">Open this page in two windows. Type in one — see it in the other.</p>
    <div style="position:absolute;width:80px;height:80px;background:#4a90d9;border-radius:8px;transition:all 0.3s ease;" g-style:top="BoxTop" g-style:left="BoxLeft"></div>
    <input type="text" placeholder="Type something..." />
    <input type="text" placeholder="Another input..." />
</body>
</html>
