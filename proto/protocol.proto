syntax = "proto3";

package godom;

option go_package = "./proto";

// --- Go → Browser messages ---

// ServerMessage is the top-level message sent from Go to the browser.
message ServerMessage {
  string type = 1;                    // "init" or "update"
  repeated Command commands = 2;
  repeated EventCommand events = 3;
}

// Command is a single DOM operation.
message Command {
  string op = 1;                      // "text","value","checked","display","class","attr","style","plugin","list","list-append","list-truncate","re-event"
  string id = 2;                      // data-gid of target element
  string name = 3;                    // class name (for "class" op), attr name, style property name, plugin name
  oneof val {
    string str_val = 4;
    bool bool_val = 5;
    double num_val = 6;
    bytes raw_val = 7;                // JSON bytes for plugin data, re-event, etc.
  }
  repeated ListItem items = 8;       // for "list" and "list-append" ops
}

// ListItem is a single item in a g-for list render.
message ListItem {
  string html = 1;
  repeated Command cmds = 2;
  repeated EventCommand evts = 3;
}

// EventCommand describes an event listener the bridge should register.
message EventCommand {
  string id = 1;                      // data-gid
  string on = 2;                      // "click","keydown","mousedown","mousemove","mouseup","wheel","input"
  string key = 3;                     // key filter for keydown
  bytes msg = 4;                      // pre-built Envelope.msg bytes — bridge sends back untouched
}

// --- VDOM: Go → Browser patch messages ---

// VDomMessage is the top-level message for the VDOM pipeline.
message VDomMessage {
  string type = 1;                    // "init" or "patch"
  bytes html = 2;                     // full rendered HTML (init only)
  repeated DomPatch patches = 3;      // incremental patches (patch only)
  repeated EventSetup events = 4;     // event listener registrations
}

// DomPatch describes a single DOM mutation produced by the diff algorithm.
message DomPatch {
  int32 index = 1;                    // depth-first traversal index of target node
  string op = 2;                      // patch operation type

  // Type-specific payloads:
  string text = 10;                   // patchText: new text content
  bytes facts = 11;                   // patchFacts: JSON-encoded FactsDiff
  bytes html_content = 12;            // patchRedraw/patchAppend: rendered HTML
  int32 count = 13;                   // patchRemoveLast: number of children to remove
  bytes reorder = 14;                 // patchReorder: JSON-encoded {inserts, removes}
  bytes plugin_data = 15;             // patchPlugin: JSON-encoded plugin data
  repeated DomPatch sub_patches = 16; // patchLazy: patches inside lazy node
  repeated EventSetup patch_events = 17; // events for newly rendered nodes (redraw/append)
}

// EventSetup describes an event listener the bridge should register.
// Similar to EventCommand but with additional options.
message EventSetup {
  string gid = 1;                     // data-gid of target element
  string event = 2;                   // "click","keydown","input", etc.
  string key = 3;                     // key filter for keydown
  bytes msg = 4;                      // pre-built WSMessage bytes
  bool stop_propagation = 5;
  bool prevent_default = 6;
}

// --- Browser → Go messages ---

// Envelope is what the bridge sends to Go on every event.
// The bridge never opens msg — it forwards it untouched.
// args carries browser-side data (mouse coords, wheel delta).
message Envelope {
  repeated double args = 1;           // browser-side args (mouse x/y, wheel deltaY)
  bytes msg = 2;                      // pre-built WSMessage bytes from Go
  bytes value = 3;                    // input value for bind events (JSON-encoded)
}

// WSMessage is the inner message pre-built by Go at render time.
// Serialized into EventCommand.msg and Envelope.msg.
message WSMessage {
  string type = 1;                    // "call" or "bind"
  string method = 2;
  repeated bytes args = 3;            // pre-resolved args, each JSON-encoded
  string field = 4;                   // field name (for bind)
  bytes value = 5;                    // new value (for bind, added by bridge)
  string scope = 6;                   // "forGID:idx" for child components
}
